services:
  contactbook-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: contactbook-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8000
      # Local browser origins (web on 3002 when using default dev scripts; prod uses 3000)
      CORS_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://127.0.0.1:3002,http://localhost:8000,http://127.0.0.1:8000,http://localhost:8001,http://127.0.0.1:8001"
      JWT_SECRET: "change-me-in-production"
    ports:
      - "8001:8000"
