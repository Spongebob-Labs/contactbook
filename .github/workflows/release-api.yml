# Creates a GitHub Release for the API when CI succeeds on a push to main that changes apps/api/.
# Tags use prefix api-v* so they do not affect git describe --match "v*" used by CI/CD for image versions.
#
# Requires default GITHUB_TOKEN permissions: contents write (set on the job).

name: Release API

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: release-api-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Detect apps/api changes
        id: detect
        run: |
          set -euo pipefail
          if git diff-tree --no-commit-id --name-only -r HEAD | grep -qE '^apps/api/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release metadata and notes
        id: prep
        if: steps.detect.outputs.changed == 'true'
        env:
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          set -euo pipefail
          LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.1")
          BASE_VERSION=${LATEST_TAG#v}
          RELEASE_VERSION="${BASE_VERSION}.${RUN_NUMBER}"
          TAG="api-v${RELEASE_VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Git tag $TAG already exists; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          PREV=$(git tag -l 'api-v*' --merged HEAD --sort=-creatordate 2>/dev/null | head -1 || true)
          {
            echo "## apps/api"
            echo
            echo "Image / CD version segment: **${RELEASE_VERSION}** (same formula as CI and CD for \`main\`)."
            echo
            if [ -n "${PREV:-}" ] && git rev-parse "$PREV^{}" >/dev/null 2>&1; then
              git log "${PREV}..HEAD" --pretty=format:'- %s (%h)' -- apps/api/ || true
            else
              git log -n 50 --pretty=format:'- %s (%h)' -- apps/api/ || true
            fi
            echo
          } > "$NOTES_FILE"

          if ! grep -qE '^- ' "$NOTES_FILE"; then
            echo "- (no commit subjects under apps/api/ in this range)" >> "$NOTES_FILE"
          fi

          echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: steps.detect.outputs.changed == 'true' && steps.prep.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.prep.outputs.tag }}"
          REL="${{ steps.prep.outputs.release_version }}"
          NOTES_PATH="${{ steps.prep.outputs.notes_path }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" HEAD
          git push origin "refs/tags/${TAG}"
          gh release create "$TAG" \
            --title "Contactbook API v${REL}" \
            --notes-file "${NOTES_PATH}"
