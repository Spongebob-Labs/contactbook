# API CI on pull requests only (tests). No GAR push, no CD, no release.
#
# Push to dev/main (merge or direct) uses ci-deploy.yml → cd.yml instead.
#
# ESLint is not run in CI; run ./scripts/validate-api.sh locally before pushing.
#
# Secrets: API_ENV_CI_B64 (optional), API_ENV_B64 (PR fallback).

name: CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/ci-deploy.yml"
      - ".github/workflows/cd.yml"
      - ".github/workflows/api-test.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "apps/api/**"
      - "packages/**"
      - "scripts/**"

jobs:
  test:
    uses: ./.github/workflows/api-test.yml
    secrets: inherit
    with:
      env_profile: pr
      fetch_depth: 1
