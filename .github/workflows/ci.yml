# API CI on pull requests only (tests). No image push, no deploy.
#
# Push to main uses deploy.yml (test → build → push to Docker Hub → deploy to VM).
#
# ESLint is not run in CI; run ./scripts/validate-api.sh locally before pushing.
#
# Env for tests is rendered from individual GitHub secrets (secrets: inherit).

name: CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/api-test.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "apps/api/**"
      - "packages/**"
      - "scripts/**"

jobs:
  test:
    uses: ./.github/workflows/api-test.yml
    secrets: inherit
    with:
      fetch_depth: 1
