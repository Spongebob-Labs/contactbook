name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci?sslmode=disable

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate (api)
        run: pnpm -C apps/api prisma:generate

      - name: Lint (api)
        run: pnpm -C apps/api lint

      - name: Build (api)
        run: pnpm -C apps/api build

      - name: Test (api)
        run: pnpm -C apps/api test

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm -C apps/web lint

      - name: Build (web)
        run: pnpm -C apps/web build
