# Deploys the API image built and pushed by CI to Cloud Run (after a successful push to main).
#
# Secrets: API_ENV_B64 (production: base64 full apps/api/.env), GCP_WORKLOAD_IDENTITY_PROVIDER,
#   GCP_SERVICE_ACCOUNT
# Variables: GCP_REGION, GCP_PROJECT_ID — optional CLOUD_RUN_SERVICE (default: contactbook-api)
#
# Prisma migrate deploy runs here once per deploy. The GitHub Actions runner must be able to reach
# the database host in DATABASE_URL (public IP, authorized network, or equivalent).

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: cd-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Decode API env (production)
        env:
          API_ENV_B64: ${{ secrets.API_ENV_B64 }}
        run: |
          set -euo pipefail
          printf '%s' "$API_ENV_B64" | base64 -d > apps/api/.env
          test -s apps/api/.env || {
            echo "API_ENV_B64 missing or invalid (decoded apps/api/.env is empty)."
            exit 1
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (api + workspace deps)
        run: pnpm install --frozen-lockfile --filter api...

      - name: Prisma migrate deploy
        run: pnpm --filter api prisma:migrate:deploy

      - name: Convert .env to Cloud Run env JSON
        run: python3 scripts/dotenv-to-gcloud-env-json.py apps/api/.env "${RUNNER_TEMP}/cloudrun-env.json"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          REGION: ${{ vars.GCP_REGION }}
          PROJECT: ${{ vars.GCP_PROJECT_ID }}
          SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          set -euo pipefail
          if [ -z "$REGION" ] || [ -z "$PROJECT" ]; then
            echo "Set repository variables GCP_REGION and GCP_PROJECT_ID."
            exit 1
          fi
          SERVICE_NAME="${SERVICE:-contactbook-api}"
          LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.1")
          BASE_VERSION=${LATEST_TAG#v}
          VERSION_TAG="${BASE_VERSION}.${RUN_NUMBER}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/contactbook/api:${VERSION_TAG}"
          gcloud run services update "${SERVICE_NAME}" \
            --project="${PROJECT}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --env-vars-file="${RUNNER_TEMP}/cloudrun-env.json" \
            --quiet
