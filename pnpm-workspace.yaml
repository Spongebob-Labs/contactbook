packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  esbuild: true
  msw: true
  prisma: true
  sharp: true
  unrs-resolver: true
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/engines"
  - "@scarf/scarf"
  - bcrypt
  - esbuild
  - msw
  - prisma
  - sharp
  - unrs-resolver
