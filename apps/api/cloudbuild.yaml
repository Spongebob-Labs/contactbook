# Cloud Build: no secrets wired here. Prefer GitHub Actions CI for builds with API_ENV_B64 / BuildKit secret `api_env`.
# To use Cloud Build, add `--secret` / Cloud Build secrets and match apps/api/Dockerfile.
substitutions:
  _REGION: europe-west1
  _GAR_REPO: contactbook
  _IMAGE_NAME: api
  _IMAGE_TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "apps/api/Dockerfile",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}",
        ".",
      ]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}"

